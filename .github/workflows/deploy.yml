name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: node-3tier
  ENVIRONMENT: dev

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies and build Web
        working-directory: ./web
        run: |
          npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::833899002429:role/node-3tier-dev-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Web to CodeDeploy
        run: |
          echo "Zipping web application..."
          zip -r web-app.zip web/ appspec.yml
          
          echo "Pushing artifact to S3 temporarily..."
          aws s3 cp web-app.zip s3://${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-deployments-833899002429/web-app.zip
          
          echo "Triggering SSM Run Command for Web..."
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Name,Values=${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-web-instance" \
            --comment "Deploy Web App" \
            --parameters 'commands=[
              "set -e",
              "export DEBIAN_FRONTEND=noninteractive",
              "which aws || (sudo apt-get update && sudo apt-get install -y awscli)",
              "which unzip || (sudo apt-get update && sudo apt-get install -y unzip)",
              "which node || (curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash - && sudo apt-get install -y nodejs)",
              "which pm2 || (sudo npm install -g pm2)",
              "aws s3 cp s3://${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-deployments-833899002429/web-app.zip /tmp/web-app.zip",
              "sudo mkdir -p /var/www/web",
              "sudo unzip -o /tmp/web-app.zip -d /var/www/",
              "sudo chmod +x /var/www/web/scripts/*.sh",
              "cd /var/www/web && sudo ./scripts/start_server.sh"
            ]' \
            --region ${{ env.AWS_REGION }}

  build-and-deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies and build API
        working-directory: ./api
        run: |
          npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::833899002429:role/node-3tier-dev-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy API to CodeDeploy
        run: |
          echo "Zipping api application..."
          zip -r api-app.zip api/ appspec.yml
          
          aws s3 cp api-app.zip s3://${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-deployments-833899002429/api-app.zip
          
          echo "Triggering SSM Run Command for API..."
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Name,Values=${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-api-instance" \
            --comment "Deploy API App" \
            --parameters 'commands=[
              "set -e",
              "export DEBIAN_FRONTEND=noninteractive",
              "which aws || (sudo apt-get update && sudo apt-get install -y awscli)",
              "which unzip || (sudo apt-get update && sudo apt-get install -y unzip)",
              "which node || (curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash - && sudo apt-get install -y nodejs)",
              "which pm2 || (sudo npm install -g pm2)",
              "aws s3 cp s3://${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-deployments-833899002429/api-app.zip /tmp/api-app.zip",
              "sudo mkdir -p /var/www/api",
              "sudo unzip -o /tmp/api-app.zip -d /var/www/",
              "sudo chmod +x /var/www/api/scripts/*.sh",
              "cd /var/www/api && sudo ./scripts/start_server.sh"
            ]' \
            --region ${{ env.AWS_REGION }}
